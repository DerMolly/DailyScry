name: Build

on:
  push:
    branches: [ main ]
    paths: ['src/**']
  pull_request:
    branches: [ main ]
    paths: ['src/**']

jobs:
  format:
    name: build
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        - name: Setup rust
          uses: ./.github/actions/setup-rust
          with:
            RUST_VERSION: stable
        - name: Run build
          run: cargo build